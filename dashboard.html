<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edukatus Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Bodoni:ital,wght@0,400;0,700;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Base palette */
      --bg-base:        #F2EFEB;
      --bg-card:        #ffffff;
      --border:         #E6E0D8;
      --border-subtle:  #F2EFEB;

      /* Sidebar */
      --sidebar-bg:     #1F2F45;
      --sidebar-text:   #ffffff;
      --sidebar-muted:  #ADBCD7;
      --sidebar-active: #553876;

      /* Text */
      --text-primary:   #3C3C3B;
      --text-secondary: #4F6A8C;
      --text-muted:     #8A8580;

      /* Accent */
      --accent:         #553876;
      --accent-dim:     #55387610;

      /* Blue scale */
      --blue-100: #EFF2F8;
      --blue-200: #D7DEEC;
      --blue-300: #ADBCD7;
      --blue-400: #4F6A8C;
      --blue-500: #384A66;
      --blue-600: #1F2F45;

      /* Beige scale */
      --beige-100: #F2EFEB;
      --beige-200: #E6E0D8;
      --beige-300: #DAD2C7;
      --beige-400: #C8C1B6;

      /* Status */
      --green:  #27ae60;
      --yellow: #d4a017;
      --red:    #c0392b;

      /* Misc */
      --radius: 12px;
      --font:        'Inter', system-ui, -apple-system, sans-serif;
      --font-serif:  'Libre Bodoni', 'Bodoni MT', Georgia, serif;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      border-right: none;
      padding: 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-header h1 {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      color: var(--sidebar-text);
      letter-spacing: 0;
    }
    .sidebar-header p {
      font-size: 11px;
      color: var(--sidebar-muted);
      margin-top: 4px;
    }

    .sidebar-nav { padding: 12px 8px; flex: 1; }

    .nav-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--sidebar-muted);
      padding: 8px 12px 4px;
      font-weight: 600;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px; cursor: pointer;
      color: var(--sidebar-muted); font-size: 13px; font-weight: 500;
      border: none; background: none; width: 100%; text-align: left;
      transition: all 0.15s;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.08);
      color: var(--sidebar-text);
    }
    .nav-item.active {
      background: var(--sidebar-active);
      color: var(--sidebar-text);
    }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-footer .btn {
      background: transparent;
      border-color: rgba(255,255,255,0.25);
      color: var(--sidebar-text);
    }
    .sidebar-footer .btn:hover {
      background: rgba(255,255,255,0.1);
    }
    .sidebar-footer .btn-danger {
      border-color: rgba(192,57,43,0.5);
      color: #e07070;
    }
    .sidebar-footer .btn-danger:hover {
      background: rgba(192,57,43,0.2);
    }

    /* ── Main content ───────────────────────────────────── */
    .main { flex: 1; padding: 28px 36px; max-width: 1200px; }

    .page-title {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 700;
      color: var(--blue-600);
      letter-spacing: 0;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* ── Stats row ──────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: 0 1px 3px rgba(31,47,69,0.06);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 4px;
      color: var(--blue-600);
      font-variant-numeric: tabular-nums;
    }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Cards ──────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(31,47,69,0.06);
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue-600);
      font-family: var(--font);
    }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── Tables ─────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 13px;
      color: var(--text-primary);
    }
    tr { cursor: pointer; transition: background 0.1s; }
    tr:hover { background: var(--blue-100); }
    tr.expanded { background: var(--accent-dim); }

    /* ── Attendance bar ─────────────────────────────────── */
    .att-bar { display: flex; align-items: center; gap: 8px; }
    .att-bar-track {
      flex: 1; height: 6px;
      background: var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .att-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .att-bar-value {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      min-width: 42px;
      text-align: right;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ── Grade badges ───────────────────────────────────── */
    .grade {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      font-weight: 700; font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .grade-A { background: #27ae6020; color: #27ae60; }
    .grade-B { background: #2ecc7120; color: #2ecc71; }
    .grade-C { background: #84cc1620; color: #5a8e10; }
    .grade-D { background: #d4a01720; color: #d4a017; }
    .grade-E { background: #e6820020; color: #e68200; }
    .grade-F { background: #c0392b20; color: #c0392b; }

    /* ── Charts ─────────────────────────────────────────── */
    .chart-container { position: relative; height: 220px; }
    .chart-container-lg { position: relative; height: 320px; }

    /* ── Detail panel (expanded student) ────────────────── */
    .detail-panel {
      background: var(--beige-100);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 8px 12px 12px;
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-section h4 {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .detail-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    .detail-item-label { color: var(--text-secondary); }

    /* ── Risk rows & tags ───────────────────────────────── */
    .risk-high {
      border-left: 3px solid var(--red);
      background: #c0392b08;
    }
    .risk-med {
      border-left: 3px solid var(--yellow);
      background: #d4a01708;
    }
    .risk-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .risk-tag-high { background: #c0392b15; color: #c0392b; }
    .risk-tag-med  { background: #d4a01715; color: #d4a017; }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      background: var(--blue-100);
      color: var(--text-secondary);
      border: 1px solid var(--blue-200);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .btn:hover { background: var(--blue-200); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    .btn-accent:hover { background: #43296a; border-color: #43296a; }
    .btn-danger {
      background: #c0392b20;
      border-color: #c0392b40;
      color: #c0392b;
    }
    .btn-danger:hover { background: #c0392b35; }

    /* ── Progress overlay ────────────────────────────────── */
    .progress-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(242, 239, 235, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .progress-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 48px;
      min-width: 400px;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(31,47,69,0.12);
      text-align: center;
    }
    .progress-box h3 {
      font-family: var(--font-serif);
      font-size: 20px;
      color: var(--blue-600);
      margin-bottom: 8px;
    }
    .progress-phase {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      min-height: 20px;
    }
    .progress-track {
      height: 8px;
      background: var(--beige-200);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-detail {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Empty state ────────────────────────────────────── */
    .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.45; }
    .empty-text { font-size: 14px; color: var(--text-muted); }
    .empty-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; opacity: 0.7; }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--blue-300); }

    /* ── Report card ───────────────────────────────────── */
    .report-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 720px;
      box-shadow: 0 2px 8px rgba(31,47,69,0.08);
      margin-bottom: 24px;
    }
    .report-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--blue-200);
    }
    .report-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--blue-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: var(--blue-500);
      flex-shrink: 0;
      overflow: hidden;
    }
    .report-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .report-name {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 700;
      color: var(--blue-600);
    }
    .report-class {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .report-flag {
      margin-left: auto;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .report-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .report-metric {
      text-align: center;
      padding: 14px 8px;
      background: var(--beige-100);
      border-radius: 10px;
    }
    .report-metric-value {
      font-size: 24px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .report-metric-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .report-section {
      margin-bottom: 20px;
    }
    .report-section h3 {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 700;
      color: var(--blue-600);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .report-insight {
      background: var(--blue-100);
      border-left: 3px solid var(--blue-400);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .report-insight strong { color: var(--blue-600); }
    .report-trend-up { color: #c0392b; }
    .report-trend-down { color: #27ae60; }
    .report-trend-stable { color: var(--text-muted); }

    @media print {
      .sidebar, .btn, .nav-item { display: none !important; }
      .main { padding: 0 !important; max-width: 100% !important; }
      .report-card { box-shadow: none; border: 1px solid #ddd; }
      body { background: white; }
    }

    /* Correlation dot styling done via Chart.js */
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Edukatus Analytics</h1>
        <p id="last-updated"></p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-label">Analys</div>
        <button class="nav-item active" data-view="overview">Översikt</button>
        <button class="nav-item" data-view="attendance">Närvaro</button>
        <button class="nav-item" data-view="patterns">Mönster</button>
        <button class="nav-item" data-view="students">Elever</button>
        <button class="nav-item" data-view="risk">Riskindikator</button>
        <div class="nav-label" style="margin-top: 8px;">Arbetsytor</div>
        <button class="nav-item" data-view="mentor">Mentorsvy</button>
        <button class="nav-item" data-view="course">Lektionsvy</button>
        <button class="nav-item" data-view="syv">SYV-lista</button>
        <div class="nav-label" style="margin-top: 8px;">Jämförelse</div>
        <button class="nav-item" data-view="yearview">Helår</button>
        <button class="nav-item" data-view="correlation">Korrelation</button>
        <button class="nav-item" data-view="classcompare">Klasser</button>
        <div class="nav-label" style="margin-top: 8px;">Rapporter</div>
        <button class="nav-item" data-view="reports">Elevrapport</button>
        <button class="nav-item" data-view="principal">Rektorsrapport</button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-sm" id="btn-refresh" style="width:100%; margin-bottom: 6px;">Uppdatera data</button>
        <button class="btn btn-sm btn-danger" id="btn-clear" style="width:100%;">Rensa all data</button>
        <a href="privacy.html" target="_blank" style="display:block;text-align:center;margin-top:8px;font-size:10px;color:var(--text-dim);text-decoration:none;">Integritetspolicy</a>
      </div>
    </aside>
    <main class="main" id="main"></main>
    <div class="progress-overlay" id="progress-overlay" style="display:none">
      <div class="progress-box">
        <h3 id="progress-title">Hämtar data</h3>
        <div class="progress-phase" id="progress-phase"></div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-detail" id="progress-detail"></div>
      </div>
    </div>
  </div>
  <script src="dist/dashboard.js"></script>
</body>
</html>
