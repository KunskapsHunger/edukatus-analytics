<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 520px;
      max-height: 580px;
      overflow-y: auto;
      background: #09090b;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    .meta { font-size: 11px; color: #71717a; }
    .tabs {
      display: flex;
      border-bottom: 1px solid #27272a;
      background: #18181b;
    }
    .tab {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: none;
      color: #a1a1aa;
      border-bottom: 2px solid transparent;
    }
    .tab:hover { color: #e4e4e7; }
    .tab.active { color: #e4e4e7; border-bottom-color: #8b5cf6; }
    .content { padding: 12px 16px; }
    .empty { color: #52525b; text-align: center; padding: 32px 16px; font-size: 12px; }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .card h3 { font-size: 12px; color: #a1a1aa; margin-bottom: 8px; font-weight: 500; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 6px 8px; color: #71717a; border-bottom: 1px solid #27272a; font-weight: 500; }
    td { padding: 6px 8px; border-bottom: 1px solid #27272a20; }
    .rate-bar {
      height: 6px;
      border-radius: 3px;
      background: #27272a;
      overflow: hidden;
    }
    .rate-bar-fill { height: 100%; border-radius: 3px; }
    .rate-high { background: #22c55e; }
    .rate-med { background: #eab308; }
    .rate-low { background: #ef4444; }
    .grade-badge {
      display: inline-block;
      width: 24px;
      height: 24px;
      line-height: 24px;
      text-align: center;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
    }
    .grade-A { background: #10b98120; color: #10b981; }
    .grade-B { background: #22c55e20; color: #22c55e; }
    .grade-C { background: #84cc1620; color: #84cc16; }
    .grade-D { background: #eab30820; color: #eab308; }
    .grade-E { background: #f59e0b20; color: #f59e0b; }
    .grade-F { background: #ef444420; color: #ef4444; }
    .chart-container { position: relative; height: 180px; }
    .btn {
      background: #27272a;
      color: #e4e4e7;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn:hover { background: #3f3f46; }
    .btn-sm { padding: 4px 8px; font-size: 10px; }
    .btn-danger { border-color: #7f1d1d; color: #fca5a5; }
    .btn-danger:hover { background: #7f1d1d; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #e4e4e7; }
    .stat-label { font-size: 10px; color: #71717a; margin-top: 2px; }
    .risk-high { border-left: 3px solid #ef4444; }
    .risk-med { border-left: 3px solid #eab308; }
    .actions { display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>
  <header>
    <h1>Edukatus Analytics</h1>
    <div class="actions">
      <button class="btn btn-sm" id="btn-scrape">Hämta data</button>
      <button class="btn btn-sm btn-danger" id="btn-clear">Rensa</button>
    </div>
  </header>

  <div class="stats-grid" id="stats" style="padding: 12px 16px 0;"></div>

  <div class="tabs">
    <button class="tab active" data-tab="attendance">Närvaro</button>
    <button class="tab" data-tab="grades">Betyg</button>
    <button class="tab" data-tab="correlation">Korrelation</button>
    <button class="tab" data-tab="risk">Risk</button>
  </div>

  <div class="content" id="content"></div>

  <script src="dist/popup.js"></script>
</body>
</html>
